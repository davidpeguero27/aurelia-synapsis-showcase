name: Public showcase problem
description: Report a reproducible problem with the public Aurelia showcase.
title: "[Showcase] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Aurelia's public showcase. Do not include credentials or private data.
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - GitHub Pages
        - Aurelia showcase site
        - PayPal support link
        - Repository documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the visible problem and the result you expected.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide a short, safe sequence that reproduces the problem.
    validations:
      required: true
